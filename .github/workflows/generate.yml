name: Generate Documentation

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Documentation task (e.g. "Document how to setup pricing")'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Generate documentation
        run: npm run generate -- "${{ github.event.inputs.task }}"
        env:
          HEADLESS: "true"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MUDDY_EMAIL: ${{ secrets.MUDDY_EMAIL }}
          MUDDY_PASSWORD: ${{ secrets.MUDDY_PASSWORD }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ screenshots/ knowledge/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: ${{ github.event.inputs.task }}"
            git push
          fi
