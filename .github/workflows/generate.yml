name: Generate Documentation

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Documentation task (e.g. "Document how to setup pricing")'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create branch
        run: |
          BRANCH="docs/$(echo "${{ github.event.inputs.task }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-50)-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser for Stagehand
        run: npx playwright install chromium --with-deps

      - name: Generate documentation
        run: npm run generate -- "${{ github.event.inputs.task }}"
        env:
          HEADLESS: "true"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MUDDY_EMAIL: ${{ secrets.MUDDY_EMAIL }}
          MUDDY_PASSWORD: ${{ secrets.MUDDY_PASSWORD }}

      - name: Commit, push and open PR
        env:
          GH_TOKEN: ${{ github.token }}
          TASK: ${{ github.event.inputs.task }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A docs/ screenshots/ knowledge/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: ${TASK}"
            git push -u origin "$BRANCH"
            BODY=$(printf "## Summary\nAuto-generated documentation for: **%s**\n\nPlease review the docs and screenshots before merging.\n\n## Checklist\n- [ ] Content is accurate\n- [ ] Screenshots look correct\n- [ ] No sensitive data visible" "$TASK")
            gh pr create --title "docs: ${TASK}" --body "$BODY"
          fi
