name: Generate Documentation

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Documentation task (e.g. "Document how to setup pricing")'
        required: true
        type: string
      branch:
        description: 'Existing branch to commit to (leave empty to create a new branch and PR)'
        required: false
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup branch
        run: |
          if [ -n "${{ github.event.inputs.branch }}" ]; then
            BRANCH="${{ github.event.inputs.branch }}"
          else
            BRANCH="docs/${{ github.run_id }}"
            git checkout -b "$BRANCH"
          fi
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser for Stagehand
        run: npx playwright install chromium --with-deps

      - name: Generate documentation
        run: npm run generate -- "${{ github.event.inputs.task }}"
        env:
          HEADLESS: "true"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MUDDY_EMAIL: ${{ secrets.MUDDY_EMAIL }}
          MUDDY_PASSWORD: ${{ secrets.MUDDY_PASSWORD }}

      - name: Commit and push
        env:
          GH_TOKEN: ${{ github.token }}
          TASK: ${{ github.event.inputs.task }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Use the doc title if available, otherwise fall back to task description
          if [ -f .doc-title ]; then
            TITLE=$(cat .doc-title)
            rm -f .doc-title
          else
            # Fall back to first line of task, trimmed to 60 chars
            TITLE=$(echo "${TASK}" | head -1 | cut -c1-60)
          fi

          git add -A docs/ screenshots/ knowledge/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: ${TITLE}"
            git push -u origin "$BRANCH"
            # Only create a PR if we created a new branch
            if [ -z "${{ github.event.inputs.branch }}" ]; then
              BODY=$(printf "## Summary\nAuto-generated documentation for: **%s**\n\nPlease review the docs and screenshots before merging.\n\n## Checklist\n- [ ] Content is accurate\n- [ ] Screenshots look correct\n- [ ] No sensitive data visible" "$TITLE")
              gh pr create --title "docs: ${TITLE}" --body "$BODY"
            fi
          fi
